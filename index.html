<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: sans-serif; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
        button { padding: 15px 40px; font-size: 18px; border: none; border-radius: 8px; background: #00AAD7; color: #fff; cursor: pointer; }
        button:hover { background: #2DBCE2; }
        #status { font-size: 14px; color: #888; }
    </style>
<base target="_blank">
</head>
<body>
    <button id="openBtn">Open Test</button>
    <div id="status"></div>

<script>
    document.getElementById('openBtn').addEventListener('click', function() {
        var win = window.open('about:blank', '_blank');
        if (!win) {
            document.getElementById('status').textContent = 'Popup blocked';
            return;
        }

        var html = '<!DOCTYPE html>' +
            '<html><head><title>Optimistic OS</title>' +
            '<meta name="viewport" content="width=device-width, initial-scale=1.0">' +
            '<style>' +
            '*{margin:0;padding:0;box-sizing:border-box}' +
            'html,body{width:100%;height:100%;overflow:hidden;background:#000}' +
            'iframe{width:100%;height:100%;border:none}' +
            '</style>' +
            '</head><body>' +
            '<iframe src="https://os.optimistic.top" ' +
            'sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-presentation" ' +
            'allow="fullscreen;clipboard-read;clipboard-write;autoplay;payment"></iframe>' +
            '</body></html>';

        win.document.open();
        win.document.write(html);
        win.document.close();
    });
</script>
</body>
</html>
